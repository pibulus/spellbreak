# Launch hints for Launch Arsenal.
# Edit aggressively. These fields should pin the app's real audience, problem, and promise.
name: Spellbreak
slug: spellbreak
app_type: mac-app
audience: people who already feel the problem
problem: >-
  people get hypnotized by the rectangle, then ignore polite break reminders
  because they feel generic, skippable, or weirdly corporate
promise: >-
  a private, local Mac menu bar app that interrupts screen trance with lush
  full-screen break rituals and just enough friction to make skipping conscious
cta: Reply if you want the link.
differentiators:
  - Native menu bar timer with quick pause, break-now, and settings controls
  - >-
    Full-screen animated overlays with aurora, cosmic, and lava themes
  - >-
    Unskippable mode by default, with optional hold-to-skip friction
  - >-
    Zero accounts, analytics, network requests, camera access, or microphone
    access
proof_points:
  - >-
    Break experience: frosted desktop blur, animated backgrounds, ambient
    particles, and short NY tarot-reader messages
  - Customizable intervals and durations from focused work blocks to longer resets
  - >-
    Hold-to-skip duration scales with break length, clamped to avoid punishment
  - >-
    Time-based aurora palettes shift across dawn, day, evening, and night
objections:
  - Needs signed/notarized distribution before public download
  - Needs current screenshots from the real built app
keywords:
  seed:
    - Spellbreak
    - spellbreak
    - mac app
  audience: people who already feel the problem
  intent:
    - take screen breaks
    - reduce eye strain
    - interrupt screen trance
manual_notes:
  - Lead with privacy and friction that feels intentional, not punitive.
